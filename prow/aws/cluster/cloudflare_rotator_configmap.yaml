apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflare-rotator
  namespace: cloudflare-secret-rotation
data:
  rotate.sh: |
    #!/usr/bin/env bash
    # Inputs (env): CF_ACCOUNT_ID, AWS_REGION
    set -euo pipefail
    set +x
    # Note that we don't rotate "cf_r2_public_buckets_ro_credentials"
    # because temp credentials can only be scoped to one bucket.
    # That's probably fine since its read-only to already-public buckets.
    buckets=(
      "istio-build"
      "istio-build-private"
      "istio-prerelease"
      "istio-prerelease-private"
      "istio-prow"
      "istio-prow-private"
      "istio-testgrid"
    )

    # Store a new value for $1 in AWS Secrets Manager. put-secret-value creates a
    # new version and moves the AWSCURRENT staging label to it (demoting the prior
    # version to AWSPREVIOUS), so no explicit prune of old versions is needed.
    upload_secret() {
      local secret=$1
      local value=$2
      aws secretsmanager put-secret-value \
        --secret-id "${secret}" \
        --secret-string "${value}" \
        --output text >/dev/null
    }
    echo "Fetching admin token value"
    admin_token=$(aws secretsmanager get-secret-value --secret-id cf_r2_admin_token --query SecretString --output text | tr -d '\n\r')
    for bucket in "${buckets[@]}"; do
      echo "Fetching parent access key id for bucket ${bucket}"
      key_id=$(aws secretsmanager get-secret-value --secret-id "cf_r2_${bucket}_credentials" --query SecretString --output text | jq -r '.access_key' | tr -d '\n\r')
      echo "Rotating credentials for bucket ${bucket}"
      body=$(jq -n \
        --arg bucket "${bucket}" \
        --arg parent "${key_id}" \
        '{bucket: $bucket, parentAccessKeyId: $parent, permission: "object-read-write", ttlSeconds: 86400}')
      response=$( \
        curl -XPOST \
        --retry 3 \
        --retry-delay 1 \
        --retry-all-errors \
        -sS \
        "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/r2/temp-access-credentials" \
        -H "Authorization: Bearer ${admin_token}" \
        -H "Content-Type: application/json" \
        -d "${body}" \
      )

      if ! echo "${response}" | jq -e '.success' > /dev/null; then
        echo "Cloudflare API error: ${response}"
        exit 1
      fi

      if ! creds=$(echo "${response}" | jq -e '.result | {accessKeyId, secretAccessKey, sessionToken} | select(.accessKeyId and .secretAccessKey and .sessionToken)'); then
        echo "Cloudflare API error: missing fields in response: ${response}"
        exit 1
      fi
      access_key_id=$(echo "${creds}" | jq -r '.accessKeyId')
      access_key_secret=$(echo "${creds}" | jq -r '.secretAccessKey')
      session_token=$(echo "${creds}" | jq -r '.sessionToken')

      # Cloudflare's temp-access-credentials endpoint returns the parent's
      # accessKeyId unchanged, so the "access_key" value stays unchanged
      credentials_json=$(jq -n \
        --arg ak "${access_key_id}" \
        --arg sk "${access_key_secret}" \
        --arg st "${session_token}" \
        --arg ep "https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com" \
        '{access_key: $ak, secret_key: $sk, session_token: $st, endpoint: $ep, s3_force_path_style: true, region: "auto"}')
      upload_secret "cf_r2_${bucket}_credentials" "${credentials_json}"
    done
