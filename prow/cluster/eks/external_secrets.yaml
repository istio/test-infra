---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-istio-testing-pusher
  namespace: test-pods
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: github-istio-testing-pusher
  data:
  - secretKey: oauth
    remoteRef:
      key: github_istio-testing_pusher
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cf-r2-istio-prow-credentials
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: cf-r2-istio-prow-credentials
  data:
  - secretKey: service-account.json
    remoteRef:
      key: cf_r2_istio-prow_credentials
---
# Mounted by sidecar/initupload for jobs that use s3:// artifact storage.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cf-r2-istio-prow-credentials
  namespace: test-pods
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: cf-r2-istio-prow-credentials
  data:
  - secretKey: service-account.json
    remoteRef:
      key: cf_r2_istio-prow_credentials
---
# Read-only R2 credentials scoped to the public buckets.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cf-r2-public-buckets-ro-credentials
  namespace: gcs
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: cf-r2-public-buckets-ro-credentials
  data:
  - secretKey: service-account.json
    remoteRef:
      key: cf_r2_public_buckets_ro_credentials
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cf-r2-public-buckets-ro-credentials
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: cf-r2-public-buckets-ro-credentials
  data:
  - secretKey: service-account.json
    remoteRef:
      key: cf_r2_public_buckets_ro_credentials
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth-token
  namespace: test-pods
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: oauth-token
  dataFrom:
  - extract:
      key: oauth_token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: istio-testing-robot-ssh-key
  namespace: test-pods
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: istio-testing-robot-ssh-key
  dataFrom:
  - extract:
      key: istio-testing_robot-ssh-key
