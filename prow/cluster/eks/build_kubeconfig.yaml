# Kubeconfig provides access to each of our EKS build clusters.
# Note: this is not secret. Authentication is done at runtime via the
# aws-iam-authenticator exec plugin (bundled in the prow images), using the
# pod's AWS identity (Pod Identity / IRSA), rather than any credential stored here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubeconfig
data:
  kubeconfig: |
    apiVersion: v1
    clusters:
    - cluster:
        certificate-authority-data: 
        server: https://D7D42DBC7FAE6565AFC4197AF33CC044.gr7.us-west-2.eks.amazonaws.com
      name: default
    - cluster:
        certificate-authority-data: 
        server: https://6F31153B6DFCC390AF2E4693B8D0834C.sk1.us-west-2.eks.amazonaws.com
      name: test-infra-trusted
    - cluster:
        certificate-authority-data: 
        server: https://4F9F885F1AE0856B99B0939B56012E2F.gr7.us-west-2.eks.amazonaws.com
      name: private
    - cluster:
        certificate-authority-data: 
        server: https://D7D42DBC7FAE6565AFC4197AF33CC044.gr7.us-west-2.eks.amazonaws.com
      name: prow-arm
    contexts:
    - context:
        cluster: default
        user: default
      name: default
    - context:
        cluster: test-infra-trusted
        user: test-infra-trusted
      name: test-infra-trusted
    - context:
        cluster: private
        user: private
      name: private
    - context:
        cluster: prow-arm
        user: prow-arm
      name: prow-arm
    current-context: default
    kind: Config
    preferences: {}
    users:
    - name: default
      user:
        exec:
          apiVersion: client.authentication.k8s.io/v1beta1
          command: aws-iam-authenticator
          args: [token, -i, prow-build]
          env:
          - name: AWS_REGION
            value: us-west-2
          provideClusterInfo: false
    - name: test-infra-trusted
      user:
        exec:
          apiVersion: client.authentication.k8s.io/v1beta1
          command: aws-iam-authenticator
          args: [token, -i, prow]
          env:
          - name: AWS_REGION
            value: us-west-2
          provideClusterInfo: false
    - name: private
      user:
        exec:
          apiVersion: client.authentication.k8s.io/v1beta1
          command: aws-iam-authenticator
          args: [token, -i, prow-private]
          env:
          - name: AWS_REGION
            value: us-west-2
          provideClusterInfo: false
    - name: prow-arm
      user:
        exec:
          apiVersion: client.authentication.k8s.io/v1beta1
          command: aws-iam-authenticator
          args: [token, -i, prow-build]
          env:
          - name: AWS_REGION
            value: us-west-2
          provideClusterInfo: false
