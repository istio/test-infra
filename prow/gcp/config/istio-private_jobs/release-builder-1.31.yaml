defaults:
  branches:
  - release-1.31
  repo-allowlist:
  - release-builder
org: istio
repo: release-builder
transforms:
- job-allowlist:
  - lint_release-builder_release-1.31
  - lint_release-builder_release-1.31_postsubmit
  - test_release-builder_release-1.31
  - test_release-builder_release-1.31_postsubmit
  - gencheck_release-builder_release-1.31
  - gencheck_release-builder_release-1.31_postsubmit
  job-type:
  - presubmit
  - postsubmit
  labels:
    preset-enable-netrc: "true"
  repo-allowlist:
  - release-builder
- env:
    GCS_BUCKET: istio-prerelease-private/prerelease
    PRERELEASE_DOCKER_HUB: us-docker.pkg.dev/istio-prow-private/istio-prow-private
    R2_BUCKET: istio-prerelease-private/prerelease
  job-allowlist:
  - build-warning_release-builder_release-1.31
  job-type:
  - presubmit
  repo-allowlist:
  - release-builder
  requirements:
  - cf-r2-istio-prerelease-private-auth
- env:
    GCS_BUCKET: istio-prerelease-private/prerelease
    HELM_BUCKET: istio-prerelease-private/charts
    PRERELEASE_DOCKER_HUB: us-docker.pkg.dev/istio-prow-private/istio-prow-private
    R2_BUCKET: istio-prerelease-private/prerelease
    R2_HELM_BUCKET: istio-prerelease-private/charts
  job-allowlist:
  - build-release_release-builder_release-1.31_postsubmit
  job-type:
  - postsubmit
  labels:
    preset-enable-netrc: "true"
    preset-override-deps: release-1.31-release
    preset-override-envoy-r2: "true"
  repo-allowlist:
  - release-builder
  requirements:
  - docker
  - cf-r2-istio-prerelease-private-auth
  - cf-r2-istio-build-private-auth
