---
# NOTE: When adding a new ExternalSecret here, make sure the build cluster's ESO
# controller role (eso_read_secrets["prow-build"] in
# infra/aws/istio/external_secrets.tf) is granted read on the new secret.
# Without that IAM grant the operator cannot fetch the secret and the K8s Secret
# will not be created.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cf-r2-istio-prow-credentials
  namespace: test-pods
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: cf-r2-istio-prow-credentials
  data:
  - secretKey: service-account.json
    remoteRef:
      key: cf_r2_istio-prow_credentials
