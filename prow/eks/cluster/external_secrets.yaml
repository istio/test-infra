---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-istio-testing-pusher
  namespace: test-pods
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: github-istio-testing-pusher
  data:
  - secretKey: oauth
    remoteRef:
      key: github_istio-testing_pusher
---
